<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Modesto GarageFest Route Planner</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
<style>
:root { --accent:#f0523d; --bg:#fafaf7; --card:#fff; --fg:#222; --muted:#666; --good:#2b8a3e; }
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font:15px/1.45 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-text-size-adjust:100%}
.wrap{display:grid;grid-template-columns:360px 1fr;gap:12px;padding:12px;height:100vh}
.panel{background:var(--card);border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:auto}
.view-toggle{display:none}
@media (max-width:900px){
  .wrap{grid-template-columns:1fr;height:auto;padding:8px;gap:8px}
  .panel{padding:12px;border-radius:8px}
  /* Tabs: show one view at a time on mobile */
  .view-toggle{display:flex;position:sticky;top:0;z-index:100;background:var(--bg);padding:4px 0 8px;gap:4px}
  .view-toggle button{flex:1;padding:10px;font-size:15px;background:#eee;color:#444;border-radius:8px}
  .view-toggle button.active{background:var(--accent);color:#fff}
  body.view-map .panel{display:none}
  body.view-map #map{height:calc(100vh - 70px);min-height:0}
  body.view-list #map{display:none}
  body.view-list .panel{min-height:calc(100vh - 70px)}
  /* Bigger tap targets */
  input[type=text],input[type=number]{font-size:16px;padding:10px}
  .cat{padding:8px 6px}
  .cat label{font-size:15px}
  .cat select{font-size:14px;padding:6px}
  button{padding:12px 14px;font-size:15px}
  .stop{padding:12px;font-size:14px}
  .stop .rm{font-size:24px;padding:4px 10px;min-width:36px}
  .kw-tag{padding:6px 10px;font-size:13px}
  h1{font-size:20px}
}
h1{font-size:18px;margin:0 0 4px;color:var(--accent)}
.sub{color:var(--muted);margin:0 0 14px;font-size:12px}
label.blk{display:block;font-weight:600;margin:10px 0 4px;font-size:12px;text-transform:uppercase;color:#444;letter-spacing:.03em}
input[type=text],input[type=number]{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:14px}
.cats{display:flex;flex-direction:column;gap:2px;max-height:none}
.cat{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:4px 6px;border-radius:6px}
.cat:hover{background:#f3f3ef}
.cat label{cursor:pointer;user-select:none;font-size:13px}
.cat .count{color:var(--muted);font-size:11px}
.cat select{font-size:12px;padding:2px 4px;border:1px solid #ddd;border-radius:4px;background:#fff}
.row{display:flex;gap:8px;align-items:center;margin:6px 0}
.row > *{flex:1}
button{background:var(--accent);color:#fff;border:0;padding:10px 14px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;width:100%}
button:hover{filter:brightness(1.08)}
button.secondary{background:#444}
.stops{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.stop{background:#f7f6f1;border-left:3px solid var(--accent);padding:8px 10px;border-radius:6px;font-size:13px;cursor:pointer}
.stop:hover{background:#f0ede2}
.stop .detail{display:none;margin-top:8px;padding-top:8px;border-top:1px dashed #ddd;font-size:12px;color:#333}
.stop.open .detail{display:block}
.stop .detail p{margin:4px 0}
.stop .detail .k{color:var(--muted);font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.04em;margin-top:6px}
.stop .detail a{color:var(--accent);text-decoration:none}
.stop .detail a:hover{text-decoration:underline}
.stop .detail .nope{color:#999;font-style:italic}
.stop .title{font-weight:600}
.stop .addr{color:var(--muted);font-size:12px}
.stop .tags{margin-top:3px;display:flex;flex-wrap:wrap;gap:4px}
.tag{background:#fff;border:1px solid #e0ddd3;border-radius:3px;padding:1px 6px;font-size:11px;color:#555}
.tag.hit{background:#e6f4ea;border-color:#b7d9bf;color:var(--good);font-weight:600}
.stop .score{color:var(--accent);font-weight:600;font-size:12px}
.stop .hdr{display:flex;justify-content:space-between;gap:6px;align-items:center}
.stop .rm{background:transparent;border:0;color:#c33;cursor:pointer;font-size:18px;line-height:1;padding:0 4px;width:auto;font-weight:700}
.stop .rm:hover{color:#fff;background:#c33;border-radius:4px}
.removed-bar{margin-top:8px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
.removed-bar a{color:var(--accent);cursor:pointer;text-decoration:underline}
#map{height:100%;min-height:400px;border-radius:10px;overflow:hidden;touch-action:none}
.fit-btn{background:#fff;border:2px solid rgba(0,0,0,.2);border-radius:4px;padding:6px 10px;font:600 13px system-ui,sans-serif;cursor:pointer;color:#333;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.fit-btn:hover{background:#f5f5f5}
.stats{background:#f3f0e8;padding:8px 10px;border-radius:6px;margin:10px 0;font-size:12px;color:#555}
.inline{display:flex;gap:10px;align-items:center}
.kw{font-size:11px;color:var(--muted);margin-left:4px}
details{margin:10px 0;padding:8px;background:#f7f6f1;border-radius:6px}
summary{cursor:pointer;font-weight:600;font-size:12px}
.kw-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.kw-tag{background:#fff;border:1px solid #ddd;border-radius:3px;padding:2px 6px;font-size:11px;cursor:pointer;user-select:none}
.kw-tag.on{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body class="view-list">
<div class="view-toggle">
  <button id="tabList" class="active">List</button>
  <button id="tabMap">Map</button>
</div>
<div class="wrap">
  <div class="panel">
    <h1>GarageFest Route Planner</h1>
    <p class="sub" id="meta">Loading…</p>

    <label class="blk">Start address</label>
    <input id="start" type="text" value="537 Terminal Ave, Modesto, CA" />

    <div class="row">
      <div>
        <label class="blk">Max stops</label>
        <input id="maxStops" type="number" value="20" min="1" max="50" />
      </div>
      <div>
        <label class="blk">Max radius <span class="kw">(mi)</span></label>
        <input id="maxRadius" type="number" value="3" min="0.5" max="15" step="0.5" />
      </div>
    </div>

    <label class="blk">Categories <span class="kw">(pick interest level)</span></label>
    <div id="cats" class="cats"></div>

    <details>
      <summary>"Bigger sale" signals</summary>
      <div class="kw-list" id="kwList"></div>
      <label class="blk" style="margin-top:8px">Min # categories listed</label>
      <input id="minCats" type="number" value="3" min="1" max="19" />
      <div class="row" style="margin-top:6px">
        <label style="display:flex;gap:6px;align-items:center;font-size:12px"><input type="checkbox" id="weightBigness" checked> Boost score by sale size</label>
      </div>
    </details>

    <div id="stats" class="stats"></div>
    <div class="row">
      <button id="gen">Generate Route</button>
    </div>
    <div class="row">
      <button id="gmaps" class="secondary">Open in Google Maps</button>
      <button id="csv" class="secondary">Download CSV</button>
    </div>

    <div id="stops" class="stops"></div>
  </div>

  <div id="map"></div>
</div>

<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const ALL_CATS = [...new Set(DATA.flatMap(s => s.cats))].sort();
const BIG_KEYWORDS = ['estate','moving','multi','huge','galore','blowout','super','4 family','3 family','2 family','6 family','5 family','family sale','rummage','community','multi-family','multi family','everything','vast','treasure','best sale','collectibles','downsizing','cleaning out','clean out'];
const DEFAULT_PREF = {
  "Electronics":3, "Outdoors":3, "Sports Equipment":3, "Books & Records":3,
  "Household":2, "Toys & Games":2, "Tools":2, "Antiques":2
};

// --- UI build ---
const catsEl = document.getElementById('cats');
const catCounts = {};
DATA.forEach(s => s.cats.forEach(c => catCounts[c] = (catCounts[c]||0)+1));
ALL_CATS.forEach(c => {
  const row = document.createElement('div'); row.className='cat';
  const lab = document.createElement('label');
  const cb = document.createElement('input'); cb.type='checkbox'; cb.dataset.cat=c;
  const pref = DEFAULT_PREF[c] || 0;
  if (pref) cb.checked = true;
  lab.appendChild(cb); lab.append(' ' + c);
  row.appendChild(lab);
  const cnt = document.createElement('span'); cnt.className='count'; cnt.textContent = catCounts[c]; row.appendChild(cnt);
  const sel = document.createElement('select'); sel.dataset.cat=c;
  [['3','Must'],['2','Want'],['1','Meh']].forEach(([v,t])=>{const o=document.createElement('option');o.value=v;o.textContent=t;sel.appendChild(o);});
  sel.value = String(pref||2);
  row.appendChild(sel);
  catsEl.appendChild(row);
});

const kwEl = document.getElementById('kwList');
const kwOn = new Set(['estate','moving','multi','huge','galore','blowout','4 family','multi-family','multi family','family sale','rummage','community','everything']);
BIG_KEYWORDS.forEach(k => {
  const t = document.createElement('span'); t.className='kw-tag'+(kwOn.has(k)?' on':''); t.textContent=k;
  t.onclick = () => { t.classList.toggle('on'); if(kwOn.has(k)) kwOn.delete(k); else kwOn.add(k); };
  kwEl.appendChild(t);
});

// --- Geocoding start address via Nominatim (once) ---
async function geocode(q) {
  const r = await fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(q), {headers:{'Accept':'application/json'}});
  const j = await r.json();
  if (!j || !j[0]) throw new Error('Could not geocode ' + q);
  return {lat: parseFloat(j[0].lat), lng: parseFloat(j[0].lon)};
}

// --- Distance ---
function dist(a,b){
  const R=6371, toR=x=>x*Math.PI/180;
  const dLat=toR(b.lat-a.lat), dLng=toR(b.lng-a.lng);
  const s1=Math.sin(dLat/2)**2 + Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(s1));
}

// --- Score stops ---
function scoreStop(s, prefs, weightBigness) {
  let score = 0;
  const hits = [];
  s.cats.forEach(c => {
    if (prefs[c]) { score += prefs[c]; hits.push(c); }
  });
  if (!hits.length) return {score:0, hits};
  if (weightBigness) {
    score += Math.min(s.cats.length - 2, 4) * 0.4; // more cats = bigger
    const t = s.title.toLowerCase();
    if ([...kwOn].some(k => t.includes(k))) score += 2;
  }
  return {score, hits};
}

// --- Nearest-neighbor order + 2-opt ---
function orderStops(start, stops) {
  if (stops.length <= 1) return stops;
  const remaining = stops.slice();
  const ord = [];
  let cur = start;
  while (remaining.length) {
    let bi=0, bd=Infinity;
    for (let i=0; i<remaining.length; i++) {
      const d = dist(cur, remaining[i]);
      if (d<bd){bd=d;bi=i;}
    }
    const next = remaining.splice(bi,1)[0];
    ord.push(next); cur = next;
  }
  // 2-opt
  const all = [start, ...ord];
  let improved = true, pass = 0;
  while (improved && pass < 20) {
    improved = false; pass++;
    for (let i=1; i<all.length-1; i++) {
      for (let j=i+1; j<all.length; j++) {
        const d1 = dist(all[i-1],all[i]) + (j+1<all.length?dist(all[j],all[j+1]):0);
        const d2 = dist(all[i-1],all[j]) + (j+1<all.length?dist(all[i],all[j+1]):0);
        if (d2 + 1e-9 < d1) {
          const rev = all.slice(i, j+1).reverse();
          all.splice(i, rev.length, ...rev);
          improved = true;
        }
      }
    }
  }
  return all.slice(1);
}

// --- Main generate ---
let startPt = null;
let currentStops = [];
let currentStart = null;
const blacklist = new Set(); // sale ids the user X'd out
const map = L.map('map', {
  center: [37.6585, -120.9877],
  zoom: 11,
  preferCanvas: true,
  zoomSnap: 0.5,
  wheelDebounceTime: 40,
  wheelPxPerZoomLevel: 100,
  inertia: true
});
// ESRI tiles don't require a referrer header (OSM does and was 403ing in the preview panel)
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',{
  maxZoom:19,
  attribution:'© Esri, HERE, Garmin, USGS, Intermap'
}).addTo(map);

// "Fit to route" control — snaps the map back to show the whole trip
const FitControl = L.Control.extend({
  options: { position: 'topleft' },
  onAdd: function() {
    const btn = L.DomUtil.create('button', 'leaflet-bar fit-btn');
    btn.innerHTML = '⤢ Fit';
    btn.title = 'Zoom to show full route';
    btn.type = 'button';
    L.DomEvent.disableClickPropagation(btn);
    btn.onclick = () => {
      if (routeLine && radiusCircle) {
        map.fitBounds(routeLine.getBounds().extend(radiusCircle.getBounds()), {padding:[30,30], maxZoom: 14});
      } else if (radiusCircle) {
        map.fitBounds(radiusCircle.getBounds(), {padding:[30,30]});
      }
    };
    return btn;
  }
});
new FitControl().addTo(map);
let markerLayer = L.layerGroup().addTo(map);
let routeLine = null;
let radiusCircle = null;

// show all sales lightly
DATA.forEach(s => L.circleMarker([s.lat,s.lng], {radius:3, color:'#aaa', fillOpacity:0.6}).addTo(markerLayer));

async function generate() {
  const prefs = {};
  document.querySelectorAll('#cats .cat').forEach(row => {
    const cb = row.querySelector('input');
    const sel = row.querySelector('select');
    if (cb.checked) prefs[cb.dataset.cat] = parseInt(sel.value,10);
  });
  const maxStops = parseInt(document.getElementById('maxStops').value,10) || 20;
  const minCats = parseInt(document.getElementById('minCats').value,10) || 1;
  const maxRadiusMi = parseFloat(document.getElementById('maxRadius').value) || 3;
  const maxRadiusKm = maxRadiusMi * 1.60934;
  const weightBigness = document.getElementById('weightBigness').checked;
  const startAddr = document.getElementById('start').value.trim();

  document.getElementById('stats').textContent = 'Geocoding start…';
  try { startPt = await geocode(startAddr + ' Modesto CA'); }
  catch(e) { document.getElementById('stats').textContent = 'Could not geocode start'; return; }

  const withDist = DATA.map(s => ({...s, distMi: dist(startPt, s) / 1.60934, ...scoreStop(s, prefs, weightBigness)}));
  const inRadius = withDist.filter(s => s.distMi <= maxRadiusMi);
  const scored = inRadius.filter(s => s.score > 0 && s.cats.length >= minCats && !blacklist.has(s.id));
  scored.sort((a,b) => b.score - a.score);
  const chosen = scored.slice(0, maxStops);

  const ordered = orderStops(startPt, chosen);
  currentStops = ordered;
  currentStart = {...startPt, addr: startAddr};
  window.__ctx = {inRadius: inRadius.length, scoredCount: scored.length, maxRadiusMi, maxRadiusKm};
  renderCurrent();
}

function renderCurrent() {
  if (!startPt || !currentStart) return;
  const {maxRadiusMi, maxRadiusKm, inRadius, scoredCount} = window.__ctx || {};
  // compute total distance
  let total = 0; let cur = startPt;
  currentStops.forEach(s => { total += dist(cur, s); cur = s; });
  const totalMi = total / 1.60934;
  document.getElementById('stats').textContent =
    `${currentStops.length} stops · ~${totalMi.toFixed(1)} mi drive · ${inRadius} sales within ${maxRadiusMi} mi · ${scoredCount} match your categories`;

  // Render list
  const list = document.getElementById('stops');
  list.innerHTML = '';
  currentStops.forEach((s, i) => {
    const div = document.createElement('div'); div.className='stop';
    const hitSet = new Set(s.hits);
    const desc = (s.description || '').trim();
    const desc2 = (s.description2 || '').trim();
    const bothDesc = [desc, desc2].filter(d => d && d.toLowerCase() !== 'not available').join('\n\n');
    const addrFull = `${s.street}, ${s.city} ${s.zip}`;
    const gmapsLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addrFull)}`;
    div.dataset.id = s.id;
    div.innerHTML = `
      <div class="hdr">
        <span class="score">#${i+1} · +${s.score.toFixed(1)}</span>
        <button class="rm" title="Remove this stop" data-id="${escapeHTML(s.id)}">×</button>
      </div>
      <div class="title">${escapeHTML(s.title)}</div>
      <div class="addr">${escapeHTML(addrFull)} · ${s.distMi.toFixed(1)} mi from start</div>
      <div class="tags">${s.cats.map(c => `<span class="tag${hitSet.has(c)?' hit':''}">${escapeHTML(c)}</span>`).join('')}</div>
      <div class="detail">
        <div class="k">Description</div>
        ${bothDesc ? `<p>${escapeHTML(bothDesc).replace(/\n/g,'<br>')}</p>` : `<p class="nope">No description provided — title &amp; category tags are all the host listed.</p>`}
        <div class="k">All categories</div>
        <p>${s.cats.map(escapeHTML).join(' · ')}</p>
        ${s.phone ? `<div class="k">Phone</div><p>${escapeHTML(s.phone)}</p>` : ''}
        ${s.email ? `<div class="k">Email</div><p><a href="mailto:${escapeHTML(s.email)}">${escapeHTML(s.email)}</a></p>` : ''}
        ${s.website ? `<div class="k">Website</div><p><a href="${escapeHTML(s.website)}" target="_blank" rel="noopener">${escapeHTML(s.website)}</a></p>` : ''}
        <div class="k">Open in</div>
        <p><a href="${gmapsLink}" target="_blank" rel="noopener">Google Maps ↗</a></p>
      </div>`;
    list.appendChild(div);
  });
  // Removed bar
  if (blacklist.size) {
    const bar = document.createElement('div'); bar.className='removed-bar';
    bar.innerHTML = `${blacklist.size} removed · <a id="restoreAll">restore all</a>`;
    list.appendChild(bar);
  }

  // Render map
  markerLayer.clearLayers();
  DATA.forEach(s => L.circleMarker([s.lat,s.lng], {radius:2, color:'#ccc', fillOpacity:0.4}).addTo(markerLayer));
  L.marker([startPt.lat, startPt.lng], {title:'Start'}).addTo(markerLayer).bindPopup('Start: '+currentStart.addr);
  currentStops.forEach((s, i) => {
    const m = L.marker([s.lat,s.lng], {title: (i+1)+'. '+s.title}).addTo(markerLayer);
    m.bindPopup(`<b>${i+1}. ${escapeHTML(s.title)}</b><br>${escapeHTML(s.street)}<br>${s.cats.join(', ')}`);
  });
  if (routeLine) routeLine.remove();
  if (radiusCircle) radiusCircle.remove();
  radiusCircle = L.circle([startPt.lat, startPt.lng], {
    radius: maxRadiusKm * 1000,
    color:'#888', weight:1, fillColor:'#888', fillOpacity:0.05, dashArray:'4 4'
  }).addTo(map);
  if (currentStops.length) {
    routeLine = L.polyline([[startPt.lat,startPt.lng], ...currentStops.map(s=>[s.lat,s.lng])], {color:'#f0523d',weight:4,opacity:0.7}).addTo(map);
    // Include the radius circle so the view always shows the whole search area.
    // maxZoom cap prevents zooming into a single point if there's only 1 stop.
    map.fitBounds(routeLine.getBounds().extend(radiusCircle.getBounds()), {padding:[30,30], maxZoom: 14});
  } else {
    map.fitBounds(radiusCircle.getBounds(), {padding:[30,30]});
  }
}

// Stop list delegation: X button removes, clicking elsewhere on the card expands details
document.getElementById('stops').addEventListener('click', (e) => {
  if (e.target.classList.contains('rm')) {
    e.stopPropagation();
    const id = e.target.dataset.id;
    blacklist.add(id);
    const idx = currentStops.findIndex(s => s.id === id);
    if (idx >= 0) {
      currentStops.splice(idx, 1);
      currentStops = orderStops(startPt, currentStops);
      renderCurrent();
    }
    return;
  }
  if (e.target.id === 'restoreAll') {
    blacklist.clear();
    generate();
    return;
  }
  // Don't toggle when clicking a link inside the detail pane
  if (e.target.closest('a')) return;
  const card = e.target.closest('.stop');
  if (!card) return;
  const wasOpen = card.classList.contains('open');
  // Close others, open this one (accordion behavior)
  document.querySelectorAll('.stop.open').forEach(c => c.classList.remove('open'));
  if (!wasOpen) {
    card.classList.add('open');
    // Pan map to this stop and open its popup
    const id = card.dataset.id;
    const s = currentStops.find(x => x.id === id);
    if (s) {
      // Just pan — don't override the user's zoom level
      map.panTo([s.lat, s.lng], {animate:true, duration:0.4});
      markerLayer.eachLayer(layer => {
        if (layer.getLatLng && Math.abs(layer.getLatLng().lat - s.lat) < 1e-6 && Math.abs(layer.getLatLng().lng - s.lng) < 1e-6) {
          if (layer.openPopup) layer.openPopup();
        }
      });
    }
  }
});

function escapeHTML(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

document.getElementById('gen').onclick = generate;

document.getElementById('gmaps').onclick = () => {
  if (!currentStops.length) { alert('Generate a route first'); return; }
  // Google Maps supports up to 10 stops per /dir/ URL — chunk if more.
  const origin = encodeURIComponent(currentStart.addr);
  const all = currentStops.map(s => encodeURIComponent(`${s.street}, ${s.city} ${s.zip}`));
  const chunkSize = 9; // 9 waypoints + origin + end = 11 - Google allows 10 total; be safe
  if (all.length <= 23) {
    const url = `https://www.google.com/maps/dir/${origin}/${all.join('/')}`;
    window.open(url, '_blank');
  } else {
    // split
    for (let i=0;i<all.length;i+=chunkSize) {
      const slice = all.slice(i, i+chunkSize);
      const prev = i===0 ? origin : all[i-1];
      const url = `https://www.google.com/maps/dir/${prev}/${slice.join('/')}`;
      window.open(url, '_blank');
    }
  }
};

document.getElementById('csv').onclick = () => {
  if (!currentStops.length) { alert('Generate a route first'); return; }
  const esc = v => { v=String(v==null?'':v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
  const hdr = ['order','title','street','city','zip','lat','lng','categories','score','matches'];
  const rows = currentStops.map((s,i) => [i+1, s.title, s.street, s.city, s.zip, s.lat, s.lng, s.cats.join('; '), s.score.toFixed(2), s.hits.join('; ')]);
  const csv = [hdr.join(',')].concat(rows.map(r=>r.map(esc).join(','))).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download='garagefest_route.csv'; a.click();
};

document.getElementById('meta').textContent = `${DATA.length} sales loaded · GarageFest runs 8am–4pm`;

// Mobile view tabs
function setView(view) {
  document.body.classList.remove('view-list','view-map');
  document.body.classList.add('view-'+view);
  document.getElementById('tabList').classList.toggle('active', view==='list');
  document.getElementById('tabMap').classList.toggle('active', view==='map');
  if (view==='map') setTimeout(() => map.invalidateSize(), 50);
}
document.getElementById('tabList').onclick = () => setView('list');
document.getElementById('tabMap').onclick = () => setView('map');

// Auto-generate on load
window.addEventListener('load', () => setTimeout(generate, 300));
</script>
</body>
